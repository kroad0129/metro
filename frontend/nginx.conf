# 실제 접속자 IP. Cloudflare 터널을 지나오면 CF-Connecting-IP에 담겨 오고,
# LAN에서 직접 붙으면 그 헤더가 없어 연결 IP를 그대로 쓴다.
# 이걸 안 하면 터널 트래픽이 전부 같은 IP로 보여 속도 제한이 접속자 전체를 묶어버린다.
map $http_cf_connecting_ip $metro_client {
    ""      $binary_remote_addr;
    default $http_cf_connecting_ip;
}

# 비밀번호가 짧아 대입 공격이 현실적인 위협이다. 속도를 묶어 무력화한다.
# API 쪽이 더 빡빡한 것은 서울시 호출 예산(1000회/일)이 걸려 있기 때문이다.
limit_req_zone $metro_client zone=metro_static:10m rate=30r/s;
limit_req_zone $metro_client zone=metro_api:10m rate=2r/s;

server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/css application/javascript application/json;
    gzip_min_length 1024;

    root /usr/share/nginx/html;
    index index.html;

    auth_basic "metro";
    auth_basic_user_file /etc/nginx/htpasswd;

    location / {
        limit_req zone=metro_static burst=60 nodelay;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        limit_req zone=metro_api burst=10 nodelay;
        proxy_pass http://backend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_connect_timeout 5s;
        proxy_read_timeout 10s;
    }
}
